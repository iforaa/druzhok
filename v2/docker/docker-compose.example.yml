# Druzhok Multi-Tenant Setup
# Copy to docker-compose.yml and fill in your values
#
# Usage:
#   1. docker compose up -d proxy orchestrator
#   2. curl -X POST http://localhost:9090/instances -d '{"name":"alice","telegramToken":"BOT_TOKEN"}'
#   3. The orchestrator creates a container for alice automatically

services:
  proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.proxy
    ports:
      - "8080:8080"
    environment:
      - NEBIUS_API_KEY=${NEBIUS_API_KEY}
      - NEBIUS_BASE_URL=${NEBIUS_BASE_URL:-https://api.tokenfactory.us-central1.nebius.com/v1/}
      - DRUZHOK_PROXY_PORT=8080
      - DRUZHOK_PROXY_REGISTRY_PATH=/data/proxy/instances.json
    volumes:
      - ../data/proxy:/data/proxy:ro
    networks:
      - druzhok-net
    restart: unless-stopped

  orchestrator:
    build:
      context: ../services/orchestrator
    ports:
      - "9090:9090"
    environment:
      - ORCHESTRATOR_PORT=9090
      - ORCHESTRATOR_DATA_DIR=/data
      - ORCHESTRATOR_PROXY_URL=http://proxy:8080
      - ORCHESTRATOR_DOCKER_IMAGE=druzhok-instance
      - ORCHESTRATOR_DOCKER_NETWORK=druzhok-net
      - ORCHESTRATOR_INSTANCES_JSON=/data/proxy/instances.json
      - ORCHESTRATOR_WORKSPACE_TEMPLATE=/app/workspace-template
    volumes:
      - ../data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ../workspace-template:/app/workspace-template:ro
    networks:
      - druzhok-net
    depends_on:
      - proxy
    restart: unless-stopped

networks:
  druzhok-net:
    driver: bridge
